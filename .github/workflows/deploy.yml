name: Deploy to GitHub Pages and Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: false

      - name: Deploy to Firebase Hosting
        continue-on-error: true
        run: |
          # yamllint disable-line rule:line-length
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            npm install -g firebase-tools
            # yamllint disable-line rule:line-length
            firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project directed-optics-460823-q5
          else
            echo "Firebase token not configured, skipping Firebase deployment"
          fi
